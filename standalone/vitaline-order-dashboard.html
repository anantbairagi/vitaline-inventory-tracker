<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitaline Health Care — Order Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F4EE;
    --paper-raised:#FFFFFF;
    --ink:#142624;
    --ink-soft:#52685F;
    --ink-faint:#8A9B92;
    --brand:#0F5F6D;
    --brand-deep:#0A3338;
    --brand-deeper:#06201F;
    --brand-tint:#E7F1F0;
    --line:#D8E2DD;
    --line-soft:#E9EFEA;
    --critical:#A8392F;
    --critical-tint:#F6E4E1;
    --watch:#A9711B;
    --watch-tint:#F5EAD4;
    --stable:#2D7A53;
    --stable-tint:#E1F0E6;
    --mute:#8C8576;
    --mute-tint:#EFECE3;
    --shadow: 0 1px 2px rgba(10,40,38,0.06), 0 8px 24px -12px rgba(10,40,38,0.18);
    --shadow-lift: 0 4px 10px rgba(10,40,38,0.08), 0 16px 32px -16px rgba(10,40,38,0.24);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size:14px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .num, .mono{ font-family:'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; }
  h1,h2,h3{ font-family:'Space Grotesk', 'IBM Plex Sans', sans-serif; margin:0; }
  a{ color:inherit; }
  button{ font-family:inherit; cursor:pointer; }
  ::selection{ background:var(--brand); color:#fff; }

  :focus-visible{
    outline:2px solid var(--brand);
    outline-offset:2px;
    border-radius:4px;
  }

  /* ============ layout shell ============ */
  .shell{ max-width:1180px; margin:0 auto; padding:0 28px; }
  @media (max-width:640px){ .shell{ padding:0 16px; } }

  /* ============ header band ============ */
  .head-band{
    position:relative;
    background:
      linear-gradient(168deg, var(--brand-deep) 0%, var(--brand-deeper) 100%);
    color:#EAF3F1;
    padding:40px 0 30px;
    overflow:hidden;
  }
  .head-band::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0px, rgba(255,255,255,0.045) 1px, transparent 1px, transparent 34px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.045) 0px, rgba(255,255,255,0.045) 1px, transparent 1px, transparent 34px);
    pointer-events:none;
  }
  .head-band::after{
    content:"";
    position:absolute; right:-120px; top:-160px;
    width:420px; height:420px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.07), transparent 70%);
    pointer-events:none;
  }
  .head-inner{ position:relative; z-index:1; }

  .eyebrow{
    font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase;
    color:#9FC9C2; margin:0 0 10px;
  }
  .head-title{ font-size:38px; font-weight:600; color:#fff; letter-spacing:-0.01em; }
  @media (max-width:640px){ .head-title{ font-size:28px; } }
  .head-sub{
    margin-top:10px; font-size:13.5px; color:#BFDAD5;
  }
  .head-sub .sep{ color:#5C8C85; margin:0 8px; }
  .head-sub b{ color:#EAF3F1; font-weight:600; }

  /* metrics row */
  .metrics{
    display:flex; gap:14px; margin-top:28px; flex-wrap:wrap;
  }
  .metric{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;
    padding:14px 20px;
    min-width:148px;
    flex:1 1 148px;
  }
  .metric .num{ font-size:26px; font-weight:600; color:#fff; line-height:1.1; }
  .metric .lbl{ font-size:11.5px; color:#A9CFC9; margin-top:4px; letter-spacing:.01em; }
  .metric.is-critical .num{ color:#F0B3A8; }

  /* network pulse */
  .pulse-block{ margin-top:30px; }
  .pulse-label{
    font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
    color:#8FBDB5; margin-bottom:10px; display:flex; align-items:baseline; justify-content:space-between;
  }
  .pulse-label span.hint{ font-size:11px; letter-spacing:0; text-transform:none; color:#6FA199; font-weight:400; }
  .pulse-strip{
    display:flex; align-items:flex-end; gap:5px; height:74px;
    border-bottom:1px solid rgba(255,255,255,0.14);
    padding-bottom:0;
    overflow-x:auto;
  }
  .pulse-bar{
    flex:1 1 0; min-width:14px; max-width:46px;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    height:100%;
    background:none; border:none; padding:0;
  }
  .pulse-bar .fill{
    width:100%; border-radius:3px 3px 0 0;
    height:2%;
    transition:height .7s cubic-bezier(.2,.8,.2,1);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.18);
  }
  .pulse-bar.tier-critical .fill{ background:#D2685C; }
  .pulse-bar.tier-watch .fill{ background:#D6A852; }
  .pulse-bar.tier-stable .fill{ background:#5FAE85; }
  .pulse-bar:hover .fill, .pulse-bar:focus-visible .fill{ filter:brightness(1.18); }
  .pulse-bar .tip{
    font-size:9.5px; color:#7FAFA7; margin-top:6px; white-space:nowrap;
    max-width:46px; overflow:hidden; text-overflow:ellipsis;
  }

  /* ============ controls bar ============ */
  .controls-wrap{
    background:var(--paper); position:sticky; top:0; z-index:30;
    border-bottom:1px solid var(--line); box-shadow:0 1px 0 var(--line);
  }
  .controls{
    display:flex; gap:10px; align-items:center; padding:14px 0; flex-wrap:wrap;
  }
  .search-box{
    flex:1 1 260px; position:relative; min-width:220px;
  }
  .search-box input{
    width:100%; padding:10px 14px 10px 36px; border-radius:8px;
    border:1px solid var(--line); background:var(--paper-raised);
    font-size:13.5px; color:var(--ink); font-family:inherit;
  }
  .search-box input::placeholder{ color:var(--ink-faint); }
  .search-box svg{ position:absolute; left:11px; top:50%; transform:translateY(-50%); opacity:.5; }

  .chip-group{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{
    border:1px solid var(--line); background:var(--paper-raised); color:var(--ink-soft);
    border-radius:999px; padding:8px 14px; font-size:12.5px; font-weight:500;
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .chip:hover{ border-color:var(--brand); color:var(--brand); }
  .chip.is-active{ background:var(--brand-deep); border-color:var(--brand-deep); color:#fff; }
  .chip .dot{ width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.55; }

  .toggle{
    display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; background:var(--paper-raised);
  }
  .toggle button{
    border:none; background:none; padding:8px 14px; font-size:12.5px; font-weight:500; color:var(--ink-soft);
  }
  .toggle button.is-active{ background:var(--brand); color:#fff; }

  /* ============ main content ============ */
  main{ padding:26px 0 70px; }

  .section{ margin-bottom:30px; }
  .section-head{
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
  }
  .section-head .tier-dot{ width:9px; height:9px; border-radius:50%; }
  .section-head h2{ font-size:15px; font-weight:600; letter-spacing:.02em; }
  .section-head .count{ font-size:12.5px; color:var(--ink-faint); font-family:'IBM Plex Mono',monospace; }
  .section-head .rule{ flex:1; height:1px; background:var(--line-soft); }

  .tier-critical h2, .tier-critical .tier-dot{ color:var(--critical); background:var(--critical); }
  .tier-watch h2, .tier-watch .tier-dot{ color:var(--watch); background:var(--watch); }
  .tier-stable h2, .tier-stable .tier-dot{ color:var(--stable); background:var(--stable); }
  .tier-inactive h2, .tier-inactive .tier-dot{ color:var(--mute); background:var(--mute); }
  .tier-critical h2{ background:none; }
  .tier-watch h2{ background:none; }
  .tier-stable h2{ background:none; }
  .tier-inactive h2{ background:none; }

  .office-card.card-inactive{
    background:repeating-linear-gradient(135deg, var(--mute-tint) 0px, var(--mute-tint) 10px, #EBE7DC 10px, #EBE7DC 20px);
    border-color:var(--line); box-shadow:none; opacity:.92;
  }
  .office-card.card-inactive h3{ color:var(--ink-soft); }
  .office-card.card-inactive:hover{ transform:translateY(-2px); border-color:var(--mute); box-shadow:var(--shadow); }
  .tier-inactive .office-card .badge{ background:var(--mute); color:#fff; }
  .status-pill.s-stockview{ background:var(--brand-tint); color:var(--brand); }

  .card-row{
    display:flex; flex-wrap:wrap; gap:12px;
  }
  .office-card{
    flex:1 1 168px; min-width:168px; max-width:220px;
    background:var(--paper-raised); border:1px solid var(--line); border-radius:12px;
    padding:16px 16px 14px; text-align:left;
    box-shadow:var(--shadow);
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .office-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow-lift); border-color:var(--brand); }
  .office-card.is-open{ border-color:var(--brand-deep); box-shadow:var(--shadow-lift); }
  .office-card .badge{
    display:inline-flex; align-items:center; gap:5px;
    font-size:10.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
    padding:3px 8px; border-radius:999px; margin-bottom:10px;
  }
  .office-card .badge .dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }
  .tier-critical .office-card .badge{ background:var(--critical-tint); color:var(--critical); }
  .tier-watch .office-card .badge{ background:var(--watch-tint); color:var(--watch); }
  .tier-stable .office-card .badge{ background:var(--stable-tint); color:var(--stable); }

  .office-card h3{ font-size:16.5px; font-weight:600; margin-bottom:10px; color:var(--ink); }
  .office-card .stat-cost{ font-size:20px; font-weight:600; font-family:'IBM Plex Mono',monospace; color:var(--ink); }
  .office-card .stat-sub{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .office-card .stat-pct{ font-size:11px; color:var(--ink-faint); margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); }
  .office-card .stat-pct b{ color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; }

  /* detail panel */
  .detail-panel{
    width:100%; margin-top:14px;
    background:var(--paper-raised); border:1px solid var(--brand-deep); border-radius:12px;
    box-shadow:var(--shadow-lift);
    animation:slideDown .25s ease;
    overflow:hidden;
  }
  @keyframes slideDown{ from{ opacity:0; transform:translateY(-6px); } to{ opacity:1; transform:none; } }

  .detail-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--line-soft);
    background:var(--brand-tint);
  }
  .detail-head h3{ font-size:17px; font-weight:600; color:var(--brand-deep); }
  .detail-head .meta{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .detail-close{
    border:none; background:var(--paper-raised); width:30px; height:30px; border-radius:8px;
    color:var(--ink-soft); font-size:16px; line-height:1; border:1px solid var(--line);
  }
  .detail-close:hover{ background:var(--critical-tint); color:var(--critical); border-color:var(--critical); }

  .detail-table-wrap{ overflow-x:auto; }
  table.detail-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.detail-table th{
    text-align:left; padding:10px 16px; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--ink-faint); border-bottom:1px solid var(--line); white-space:nowrap; font-weight:600;
  }
  table.detail-table th.num-col, table.detail-table td.num-col{ text-align:right; }
  table.detail-table td{ padding:10px 16px; border-bottom:1px solid var(--line-soft); vertical-align:middle; }
  table.detail-table tbody tr:hover{ background:var(--line-soft); }
  table.detail-table .item-name{ font-weight:500; color:var(--ink); }
  table.detail-table .item-vendor{ font-size:11px; color:var(--ink-faint); margin-top:1px; }
  table.detail-table .cost-cell{ font-family:'IBM Plex Mono',monospace; font-weight:500; }
  table.detail-table .qty-cell{ font-family:'IBM Plex Mono',monospace; }

  .status-pill{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; font-weight:600; padding:4px 9px; border-radius:6px; white-space:nowrap;
  }
  .status-pill .dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }
  .status-pill.s-order{ background:var(--critical-tint); color:var(--critical); }
  .status-pill.s-below{ background:var(--watch-tint); color:var(--watch); }
  .status-pill.s-ok{ background:var(--stable-tint); color:var(--stable); }
  .status-pill.s-other{ background:var(--mute-tint); color:var(--mute); }

  .detail-empty{ padding:30px 20px; text-align:center; color:var(--ink-faint); font-size:13px; }
  .detail-footnote{ padding:10px 20px 16px; font-size:11.5px; color:var(--ink-faint); }

  /* search results mode */
  .search-results .result-row{
    display:flex; align-items:center; gap:14px; padding:12px 16px;
    background:var(--paper-raised); border:1px solid var(--line); border-radius:10px; margin-bottom:8px;
  }
  .search-results .result-row .ritem{ flex:1; min-width:0; }
  .search-results .result-row .ritem .name{ font-weight:500; font-size:13.5px; }
  .search-results .result-row .ritem .meta{ font-size:11.5px; color:var(--ink-faint); margin-top:2px; }
  .search-results .result-row .rqty{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--ink-soft); text-align:right; width:90px; flex-shrink:0; }
  .search-results .result-row .rcost{ font-family:'IBM Plex Mono',monospace; font-size:13.5px; font-weight:600; text-align:right; width:90px; flex-shrink:0; }
  .search-meta{ font-size:12.5px; color:var(--ink-faint); margin-bottom:14px; }

  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-faint); }
  .empty-state .big{ font-size:34px; margin-bottom:10px; }

  /* footer */
  footer{
    border-top:1px solid var(--line); padding:22px 0 40px;
    font-size:12px; color:var(--ink-faint); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  footer b{ color:var(--ink-soft); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }

  @media (max-width:520px){
    .metric{ flex:1 1 100%; }
    .office-card{ flex:1 1 100%; max-width:none; }
    table.detail-table th, table.detail-table td{ padding:8px 10px; }
  }
</style>
</head>
<body>

<div class="head-band">
  <div class="shell head-inner">
    <p class="eyebrow">Vitaline Health Care · Clinical Operations</p>
    <h1 class="head-title">Order Dashboard</h1>
    <p class="head-sub">
      Demand window <b id="dw-range">—</b>
      <span class="sep">·</span>
      Stock snapshot <b id="dw-snap">—</b>
      <span class="sep">·</span>
      Basis <b id="dw-basis">—</b>
    </p>

    <div class="metrics" id="metrics">
      <!-- filled by JS -->
    </div>

    <div class="pulse-block">
      <div class="pulse-label">
        <span>Network pulse — order $ by office, this week</span>
        <span class="hint">click a bar to jump in</span>
      </div>
      <div class="pulse-strip" id="pulse-strip"></div>
    </div>
  </div>
</div>

<div class="controls-wrap">
  <div class="shell controls">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Search item, SKU, or vendor across all offices…" autocomplete="off">
    </div>
    <div class="chip-group" id="vendor-chips"></div>
    <div class="toggle" id="scope-toggle">
      <button data-scope="needs" class="is-active">Needs order</button>
      <button data-scope="full">Full item list</button>
    </div>
  </div>
</div>

<main class="shell">
  <div id="card-view"></div>
  <div id="search-view" style="display:none;"></div>
</main>

<footer class="shell">
  <div>Source: <b>Vitaline_Live_PAR_Workbook</b> — Order_Sheet / PAR_Output engine. Read-only snapshot, generated for purchasing review.</div>
  <div id="gen-stamp"></div>
</footer>

const COLS = {office:0,vendor:1,item:2,unitBasis:3,unitsPerPack:4,pricePerPack:5,onHand:6,parTarget:7,rop:8,orderPacks:9,orderUnits:10,orderCost:11,status:12};

const state = { vendor:'all', scope:'needs', search:'', activeOffice:null };

function money(n){
  n = n||0;
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function qty(n){
  if(n===null||n===undefined||n==='') return '—';
  if(Math.abs(n - Math.round(n)) < 0.005) return Math.round(n).toLocaleString('en-US');
  return n.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1});
}
function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-'); }
function esc(s){ return (s===null||s===undefined)?'':String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function statusPillClass(status){
  if(status==='ORDER') return 's-order';
  if(status==='Below Target') return 's-below';
  if(status==='OK') return 's-ok';
  if(status==='Stock View') return 's-stockview';
  return 's-other';
}
function statusLabel(status){
  if(status==='ORDER') return 'Order now';
  if(status==='Below Target') return 'Below target';
  if(status==='OK') return 'On track';
  if(status==='Stock View') return 'Stock view';
  if(status==='Inactive') return 'Inactive';
  if(status==='No Demand') return 'No demand';
  return status;
}

const ACT = DATA.activation || {};
function isActive(office){ return (ACT[office] || 'Y') === 'Y'; }

function vendorMatch(row){
  return state.vendor==='all' || row[COLS.vendor]===state.vendor;
}
function isNeedsRow(row){
  const s = row[COLS.status];
  return s==='ORDER' || s==='Below Target';
}

function officeList(){
  const seen = new Set(); const out = [];
  DATA.rows.forEach(r=>{ if(!seen.has(r[COLS.office])){ seen.add(r[COLS.office]); out.push(r[COLS.office]); } });
  return out;
}

// Aggregate per office — ALWAYS uses needs-only semantics for headline stats,
// vendor filter applied, regardless of the scope toggle (which only affects the detail table).
// Inactive offices get tier 'inactive' and are excluded from network totals.
function aggregateOffices(){
  const agg = {};
  officeList().forEach(o=> agg[o] = {office:o, cost:0, needCount:0, trackedCount:0, orderN:0, belowN:0, okN:0, active:isActive(o)});
  DATA.rows.forEach(r=>{
    if(!vendorMatch(r)) return;
    const o = r[COLS.office]; const s = r[COLS.status]; const a = agg[o];
    if(s==='ORDER'||s==='Below Target'||s==='OK') a.trackedCount++;
    if(s==='ORDER'){ a.orderN++; a.needCount++; a.cost += r[COLS.orderCost]||0; }
    else if(s==='Below Target'){ a.belowN++; a.needCount++; a.cost += r[COLS.orderCost]||0; }
    else if(s==='OK'){ a.okN++; }
  });
  return Object.values(agg).map(a=>{
    a.pct = a.trackedCount ? (100*a.needCount/a.trackedCount) : 0;
    if(!a.active){ a.tier = 'inactive'; }
    else { a.tier = a.pct>50 ? 'critical' : (a.pct>=25 ? 'watch' : 'stable'); }
    return a;
  });
}

function networkTotals(aggList){
  const active = aggList.filter(a=>a.active);
  const cost = active.reduce((s,a)=>s+a.cost,0);
  const items = active.reduce((s,a)=>s+a.needCount,0);
  const critical = active.filter(a=>a.tier==='critical').length;
  return {cost, items, critical, offices: active.length};
}

function renderMetrics(totals){
  const el = document.getElementById('metrics');
  el.innerHTML = `
    <div class="metric">
      <div class="num">${money(totals.cost)}</div>
      <div class="lbl">to order this week</div>
    </div>
    <div class="metric">
      <div class="num">${totals.items.toLocaleString()}</div>
      <div class="lbl">line items need ordering</div>
    </div>
    <div class="metric ${totals.critical>0?'is-critical':''}">
      <div class="num">${totals.critical} <span style="font-size:15px;font-weight:500;opacity:.7">/ ${totals.offices}</span></div>
      <div class="lbl">of active offices at critical risk</div>
    </div>
  `;
}

const PULSE_TRACK_PX = 58;
function renderPulse(aggList){
  const el = document.getElementById('pulse-strip');
  const sorted = [...aggList].filter(a=>a.active).sort((a,b)=>b.cost-a.cost);
  const max = Math.max(1, ...sorted.map(a=>a.cost));
  el.innerHTML = sorted.map(a=>{
    const h = Math.max(2, Math.round(PULSE_TRACK_PX*a.cost/max));
    return `<button class="pulse-bar tier-${a.tier}" data-office="${esc(a.office)}" data-h="${h}" title="${esc(a.office)} — ${money(a.cost)} (${a.needCount} items)">
      <div class="fill" style="height:2px"></div>
      <div class="tip">${esc(a.office)}</div>
    </button>`;
  }).join('');
  requestAnimationFrame(()=>{
    el.querySelectorAll('.pulse-bar').forEach(b=>{ b.querySelector('.fill').style.height = b.dataset.h + 'px'; });
  });
  el.querySelectorAll('.pulse-bar').forEach(b=> b.addEventListener('click', ()=> selectOffice(b.dataset.office, true)));
}

function tierLabel(t){ return t==='critical'?'Critical':(t==='watch'?'Watch':(t==='inactive'?'Inactive':'Stable')); }
function tierBlurb(t){
  if(t==='critical') return 'over half of tracked items need ordering';
  if(t==='watch') return 'a meaningful share of items need ordering';
  if(t==='inactive') return 'toggled off — excluded from totals';
  return 'most items are at or above target';
}

function renderCards(aggList){
  const container = document.getElementById('card-view');
  const tiers = ['critical','watch','stable','inactive'];
  const sections = tiers.map(tier=>{
    const list = aggList.filter(a=>a.tier===tier).sort((a,b)=>b.cost-a.cost);
    if(list.length===0) return '';
    const cardsHtml = list.map(a=>{
      if(tier==='inactive'){
        return `
        <button class="office-card card-inactive ${state.activeOffice===a.office?'is-open':''}" id="card-${slug(a.office)}" data-office="${esc(a.office)}">
          <span class="badge"><span class="dot"></span>Inactive</span>
          <h3>${esc(a.office)}</h3>
          <div class="stat-cost" style="color:var(--ink-faint)">—</div>
          <div class="stat-sub">excluded from ordering</div>
          <div class="stat-pct">Set to <b>Y</b> in Office Activation to re-enable</div>
        </button>`;
      }
      return `
      <button class="office-card ${state.activeOffice===a.office?'is-open':''}" id="card-${slug(a.office)}" data-office="${esc(a.office)}">
        <span class="badge"><span class="dot"></span>${tierLabel(a.tier)}</span>
        <h3>${esc(a.office)}</h3>
        <div class="stat-cost">${money(a.cost)}</div>
        <div class="stat-sub">${a.needCount} item${a.needCount===1?'':'s'} to order</div>
        <div class="stat-pct"><b>${a.pct.toFixed(0)}%</b> of ${a.trackedCount} tracked items below target</div>
      </button>`;
    }).join('');
    return `
      <section class="section tier-${tier}" data-tier-section="${tier}">
        <div class="section-head">
          <span class="tier-dot"></span>
          <h2>${tierLabel(tier)} · ${list.length} office${list.length===1?'':'s'}</h2>
          <span class="count">${tierBlurb(tier)}</span>
          <span class="rule"></span>
        </div>
        <div class="card-row" data-row-for="${tier}">${cardsHtml}</div>
      </section>
    `;
  });
  container.innerHTML = sections.join('');

  container.querySelectorAll('.office-card').forEach(c=>{
    c.addEventListener('click', ()=> selectOffice(c.dataset.office, false));
  });

  if(state.activeOffice){
    renderDetailInline(state.activeOffice);
  }
}

function selectOffice(office, scrollTo){
  state.activeOffice = (state.activeOffice===office) ? null : office;
  const aggList = aggregateOffices();
  renderCards(aggList);
  if(state.activeOffice && scrollTo){
    const card = document.getElementById('card-'+slug(office));
    if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function renderDetailInline(office){
  const card = document.getElementById('card-'+slug(office));
  if(!card) return;
  const rowContainer = card.closest('.card-row');

  let rows = DATA.rows.filter(r=> r[COLS.office]===office && vendorMatch(r));
  if(state.scope==='needs'){
    rows = rows.filter(r=> isNeedsRow(r));
  } else {
    // full list: keep everything, but push No Demand / Excluded to the bottom
  }
  const order = {ORDER:0,'Below Target':1,OK:2,'No Demand':3,Excluded:4};
  rows.sort((a,b)=>{
    const oa = order[a[COLS.status]] ?? 5, ob = order[b[COLS.status]] ?? 5;
    if(oa!==ob) return oa-ob;
    return (b[COLS.orderCost]||0) - (a[COLS.orderCost]||0);
  });

  const totalCost = rows.reduce((s,r)=> s + (isNeedsRow(r)? (r[COLS.orderCost]||0) : 0), 0);

  let bodyHtml;
  if(rows.length===0){
    bodyHtml = `<div class="detail-empty">No items match the current filters for ${esc(office)}.</div>`;
  } else {
    bodyHtml = `
      <div class="detail-table-wrap">
      <table class="detail-table">
        <thead><tr>
          <th>Item</th><th>Status</th>
          <th class="num-col">On hand</th><th class="num-col">PAR target</th>
          <th class="num-col">Order qty</th><th class="num-col">Est. cost</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>{
            const basis = r[COLS.unitBasis] ? r[COLS.unitBasis] : '';
            const orderQ = r[COLS.orderPacks];
            return `<tr>
              <td><div class="item-name">${esc(r[COLS.item])}</div><div class="item-vendor">${esc(r[COLS.vendor])}</div></td>
              <td><span class="status-pill ${statusPillClass(r[COLS.status])}"><span class="dot"></span>${statusLabel(r[COLS.status])}</span></td>
              <td class="num-col qty-cell">${qty(r[COLS.onHand])}</td>
              <td class="num-col qty-cell">${qty(r[COLS.parTarget])}</td>
              <td class="num-col qty-cell">${orderQ?qty(orderQ):'—'}</td>
              <td class="num-col cost-cell">${r[COLS.orderCost]?money(r[COLS.orderCost]):'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
      <div class="detail-footnote">${rows.filter(isNeedsRow).length} item${rows.filter(isNeedsRow).length===1?'':'s'} to order · ${money(totalCost)} estimated ${state.vendor==='all'?'':'(' + state.vendor + ' only)'}</div>
    `;
  }

  const panel = document.createElement('div');
  panel.className = 'detail-panel';
  panel.innerHTML = `
    <div class="detail-head">
      <div>
        <h3>${esc(office)}</h3>
        <div class="meta">${state.scope==='needs' ? 'Showing items that need ordering' : 'Full item list, including items on track'}</div>
      </div>
      <button class="detail-close" aria-label="Close">×</button>
    </div>
    ${bodyHtml}
  `;
  panel.querySelector('.detail-close').addEventListener('click', ()=>{ state.activeOffice=null; renderCards(aggregateOffices()); });

  rowContainer.insertAdjacentElement('afterend', panel);
}

function renderSearch(){
  const cardView = document.getElementById('card-view');
  const searchView = document.getElementById('search-view');
  const q = state.search.trim().toLowerCase();
  if(!q){
    cardView.style.display='';
    searchView.style.display='none';
    return;
  }
  cardView.style.display='none';
  searchView.style.display='';

  let rows = DATA.rows.filter(r=> vendorMatch(r) && (state.scope==='full' || isNeedsRow(r)));
  rows = rows.filter(r=>{
    return String(r[COLS.item]).toLowerCase().includes(q) || String(r[COLS.vendor]).toLowerCase().includes(q) || String(r[COLS.office]).toLowerCase().includes(q);
  });
  rows.sort((a,b)=> (b[COLS.orderCost]||0) - (a[COLS.orderCost]||0));

  if(rows.length===0){
    searchView.innerHTML = `<div class="empty-state"><div class="big">No matches</div>Try a different item name, SKU, or vendor.</div>`;
    return;
  }

  const shown = rows.slice(0,300);
  searchView.innerHTML = `
    <div class="search-meta">${rows.length} result${rows.length===1?'':'s'} for “${esc(state.search)}”${rows.length>300?' — showing first 300':''}</div>
    <div class="search-results">
      ${shown.map(r=>`
        <div class="result-row">
          <div class="ritem">
            <div class="name">${esc(r[COLS.item])}</div>
            <div class="meta">${esc(r[COLS.office])} · ${esc(r[COLS.vendor])} · <span class="status-pill ${statusPillClass(r[COLS.status])}" style="padding:2px 7px;"><span class="dot"></span>${statusLabel(r[COLS.status])}</span></div>
          </div>
          <div class="rqty">${r[COLS.orderPacks]?qty(r[COLS.orderPacks])+' pk':'—'}</div>
          <div class="rcost">${r[COLS.orderCost]?money(r[COLS.orderCost]):'—'}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderVendorChips(){
  const vendors = Array.from(new Set(DATA.rows.map(r=>r[COLS.vendor]))).sort();
  const el = document.getElementById('vendor-chips');
  const all = [{key:'all', label:'All vendors'}, ...vendors.map(v=>({key:v,label:v}))];
  el.innerHTML = all.map(v=>`<button class="chip ${state.vendor===v.key?'is-active':''}" data-vendor="${esc(v.key)}">${esc(v.label)}</button>`).join('');
  el.querySelectorAll('.chip').forEach(c=> c.addEventListener('click', ()=>{
    state.vendor = c.dataset.vendor;
    fullRender();
  }));
}

function fullRender(){
  const aggList = aggregateOffices();
  renderMetrics(networkTotals(aggList));
  renderPulse(aggList);
  renderVendorChips();
  renderCards(aggList);
  renderSearch();
}

document.getElementById('search-input').addEventListener('input', (e)=>{
  state.search = e.target.value;
  renderSearch();
});
document.querySelectorAll('#scope-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#scope-toggle button').forEach(b=>b.classList.remove('is-active'));
    btn.classList.add('is-active');
    state.scope = btn.dataset.scope;
    fullRender();
  });
});

document.getElementById('dw-range').textContent = DATA.controls.booking_start + ' – ' + DATA.controls.booking_end;
document.getElementById('dw-snap').textContent = DATA.controls.snapshot;
document.getElementById('dw-basis').textContent = DATA.controls.demand_basis;
document.getElementById('gen-stamp').textContent = 'Generated ' + new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});

fullRender();
</script>
</body>
</html>
